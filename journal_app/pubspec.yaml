name: journal_app
description: E2EE Journal App - Blog Series Demo
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  dio: ^5.4.0
  provider: ^6.1.1
  shared_preferences: ^2.2.2
  cupertino_icons: ^1.0.2

  # [Step 3] Cryptography — libsodium bindings (sumo variant for Argon2id)
  sodium_libs: ^3.4.6

  # [Step 3] Secure local storage for encryption keys
  flutter_secure_storage: ^9.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
