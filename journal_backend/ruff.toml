# Ruff configuration for journal_backend
target-version = "py311"
line-length = 99
exclude = [".venv"]

[lint]
select = [
    "E",    # pycodestyle errors
    "W",    # pycodestyle warnings
    "F",    # pyflakes
    "I",    # isort
    "UP",   # pyupgrade
    "B",    # flake8-bugbear
    "SIM",  # flake8-simplify
    "RUF",  # ruff-specific rules
]
ignore = [
    "E501",   # line too long — handled by formatter
    "B008",   # do not perform function calls in argument defaults (FastAPI Depends)
]

[lint.per-file-ignores]
"alembic/*" = ["E", "W", "F", "I", "UP", "B", "SIM", "RUF"]

[lint.isort]
known-first-party = ["models", "routers", "log"]
